<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - FinTrack</title>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

<div class="dashboard">

  <!-- HEADER -->
  <header class="dash-header">
    <h1>💰 FinTrack Dashboard</h1>
    <button onclick="logout()" class="btn ghost">Logout</button>
  </header>

  <!-- SUMMARY -->
  <section class="summary">
    <div class="card">
      <h3>Current Balance</h3>
      <p id="balance">₹0</p>
    </div>

    <div class="card">
      <h3>Total Expenses</h3>
      <p id="expenses">₹0</p>
    </div>

    <div class="card">
      <h3>Budget Remaining</h3>
      <p id="budgetRemain">₹0</p>
    </div>
  </section>

  <!-- MAIN GRID -->
  <section class="grid">

    <!-- ADD TRANSACTION -->
    <div class="card">
      <h2>Add Transaction</h2>

      <input id="amount" placeholder="Amount"/>
      
      <select id="type">
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>
      </select>

      <input id="category" placeholder="Category"/>
      <input id="description" placeholder="Description"/>

      <button onclick="addTransaction()" class="btn primary full">Add Transaction</button>
    </div>

    <!-- TRANSACTIONS -->
    <div class="card">
      <h2>Transactions</h2>
      <button onclick="getTransactions()" class="btn secondary">Refresh</button>
      <div id="transactions" class="list"></div>
    </div>

    <!-- BUDGET -->
    <div class="card">
      <h2>Set Budget</h2>

      <input id="limit" placeholder="Monthly Limit"/>
      <input id="month" placeholder="Month (1-12)"/>
      <input id="year" placeholder="Year"/>

      <button onclick="setBudget()" class="btn primary full">Save Budget</button>
    </div>

    <!-- BUDGET STATUS -->
    <div class="card">
      <h2>Budget Status</h2>
      <button onclick="getBudget()" class="btn secondary">Check Status</button>
      <div id="budget" class="list"></div>
    </div>

  </section>

</div>

<script>
const API = "http://127.0.0.1:8000";

function getToken() {
  return localStorage.getItem("token");
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

window.addTransaction = async function () {
  const token = getToken();

  const amountVal = Number(document.getElementById("amount").value);
  const typeVal = document.getElementById("type").value.toLowerCase(); // ✅ FIXED
  const categoryVal = document.getElementById("category").value;
  const descVal = document.getElementById("description").value || "";

  if (!amountVal || !categoryVal) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch(`${API}/transactions/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      amount: amountVal,
      type: typeVal, 
      category: categoryVal,
      description: descVal,
      transaction_date: new Date().toISOString() 
    })
  });

  if (!res.ok) {
    const error = await res.text();
    console.error("ERROR:", error);
    alert(error);
    return;
  }

  alert("Transaction added");
  loadDashboard();
};

window.getTransactions = async function () {
  const res = await fetch(`${API}/transactions/`, {
    headers: { Authorization: `Bearer ${getToken()}` }
  });

  const data = await res.json();

  let totalExpenses = 0;

  document.getElementById("transactions").innerHTML =
    data.transactions.map(tx => {

      if (tx.type && tx.type.toLowerCase() === "expense") {
        totalExpenses += Number(tx.amount);
      }

      return `
        <div class="tx ${tx.type}">
          <span>${tx.category}</span>
          <span>₹${tx.amount}</span>
        </div>
      `;
    }).join("");

  document.getElementById("balance").innerText =
    "₹" + data.current_balance;

  document.getElementById("expenses").innerText =
    "₹" + totalExpenses;
};

window.setBudget = async function () {
  const now = new Date();

  await fetch(`${API}/budgets/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${getToken()}`
    },
    body: JSON.stringify({
      monthly_limit: parseFloat(document.getElementById("limit").value),
      month: now.getMonth() + 1,
      year: now.getFullYear()
    })
  });

  loadDashboard();
};

// get budget
window.getBudget = async function () {
  const now = new Date();
  const month = now.getMonth() + 1;
  const year = now.getFullYear();

  const res = await fetch(
    `${API}/budgets/status?month=${month}&year=${year}`,
    {
      headers: { Authorization: `Bearer ${getToken()}` }
    }
  );

  if (!res.ok) {
    document.getElementById("budgetRemain").innerText = "₹0";
    document.getElementById("budget").innerHTML = "No budget set";
    return;
  }

  const data = await res.json();

  document.getElementById("budgetRemain").innerText =
    "₹" + (data.remaining_budget ?? 0);

  document.getElementById("budget").innerHTML = `
    <div>Spent: ₹${data.total_spent}</div>
    <div>Remaining: ₹${data.remaining_budget}</div>
    <div>Status: ${data.overspending ? "⚠ Over Budget" : "✅ On Track"}</div>
  `;
};

window.loadDashboard = async function loadDashboard() {
  await getTransactions();
  await getBudget();
}

window.onload = function () {
  loadDashboard();
};

</script>

</body>
</html>
